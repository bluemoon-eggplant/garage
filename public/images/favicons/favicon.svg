<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1e293b"/>
  <!-- Garage roof -->
  <polygon points="256,80 440,200 72,200" fill="#f97316" />
  <!-- Garage body -->
  <rect x="96" y="200" width="320" height="232" fill="#334155" />
  <!-- Garage door -->
  <rect x="136" y="240" width="240" height="192" rx="8" fill="#475569" />
  <!-- Door lines -->
  <line x1="136" y1="288" x2="376" y2="288" stroke="#64748b" stroke-width="3"/>
  <line x1="136" y1="336" x2="376" y2="336" stroke="#64748b" stroke-width="3"/>
  <line x1="136" y1="384" x2="376" y2="384" stroke="#64748b" stroke-width="3"/>
  <!-- Car silhouette -->
  <g transform="translate(176, 340)">
    <!-- Car body -->
    <path d="M20,40 L30,10 Q35,0 45,0 L115,0 Q125,0 130,10 L140,40 Z" fill="#f97316" opacity="0.9"/>
    <rect x="10" y="40" width="140" height="30" rx="6" fill="#f97316" opacity="0.9"/>
    <!-- Wheels -->
    <circle cx="45" cy="72" r="14" fill="#1e293b"/>
    <circle cx="45" cy="72" r="7" fill="#64748b"/>
    <circle cx="115" cy="72" r="14" fill="#1e293b"/>
    <circle cx="115" cy="72" r="7" fill="#64748b"/>
    <!-- Windows -->
    <path d="M38,12 L48,0 L80,0 L80,12 Z" fill="#94a3b8" opacity="0.6"/>
    <path d="M85,0 L115,0 Q120,0 122,10 L122,12 L85,12 Z" fill="#94a3b8" opacity="0.6"/>
  </g>
</svg>
